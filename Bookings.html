<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إدارة الحجوزات</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body class="bg-gray-100">

<!-- LOGIN -->

<div id="loginPage"
class="min-h-screen flex items-center justify-center">

<div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">

<h2 class="text-3xl font-bold text-center mb-6">
تسجيل دخول إدارة الحجوزات
</h2>

<input
id="username"
type="text"
placeholder="اسم المستخدم"
class="w-full border p-3 rounded mb-4">

<input
id="password"
type="password"
placeholder="كلمة المرور"
class="w-full border p-3 rounded mb-4">

<button onclick="loginBookings()"
class="w-full bg-teal-600 text-white p-3 rounded">
دخول
</button>

</div>

</div>

<!-- PAGE -->

<div id="bookingsPage" class="hidden">

<header class="bg-teal-700 text-white p-5">

<div class="flex justify-between items-center">

<h1 class="text-2xl font-bold">
إدارة الحجوزات
</h1>

<div class="flex gap-3">

<a href="../dashboard.html"
class="bg-blue-600 px-4 py-2 rounded-lg">
الباقات
</a>

<button
onclick="logoutBookings()"
class="bg-red-500 px-4 py-2 rounded-lg">

تسجيل الخروج
</button>

</div>

</div>

</header>

<div class="max-w-7xl mx-auto p-6">
<div class="grid md:grid-cols-4 gap-4 mb-6">

<div class="bg-white p-5 rounded-xl shadow text-center">
<div class="text-gray-500">
إجمالي الحجوزات
</div>
<div id="totalBookings"
class="text-3xl font-bold">
0
</div>
</div>

<div class="bg-white p-5 rounded-xl shadow text-center">
<div class="text-gray-500">
تمت المراجعة
</div>
<div id="reviewedBookings"
class="text-3xl font-bold text-green-600">
0
</div>
</div>

<div class="bg-white p-5 rounded-xl shadow text-center">
<div class="text-gray-500">
لم تتم المراجعة
</div>
<div id="pendingBookings"
class="text-3xl font-bold text-red-600">
0
</div>
</div>

<div class="bg-white p-5 rounded-xl shadow text-center">
<div class="text-gray-500">
الإيرادات
</div>
<div id="totalRevenue"
class="text-3xl font-bold text-blue-600">
0
</div>
</div>

</div>

<div class="bg-white rounded-xl shadow-lg overflow-hidden">

<table class="w-full">

<thead class="bg-gray-200">

<tr>

<th class="p-3">الباقة</th>
<th class="p-3">موعد الرحلة</th>
<th class="p-3">نوع الحجز</th>
<th class="p-3">الاسم</th>
<th class="p-3">الجوال</th>
<th class="p-3">الأفراد</th>
<th class="p-3">الإجمالي</th>
<th class="p-3">الحالة</th>
<th class="p-3">التاريخ</th>
<th class="p-3">إجراءات</th>

</tr>

</thead>

<tbody id="bookingsTable"></tbody>

</table>

</div>

</div>

</div>

<script src="bookings-supabase.js"></script>
<script src="bookings.js"></script>

</body>
</html>
