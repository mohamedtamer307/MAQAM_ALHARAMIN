<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم - رحلات العمرة</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

  <header class="bg-teal-700 text-white p-6 text-center text-2xl font-bold">
    لوحة التحكم
  </header>

  <main class="p-6 max-w-4xl mx-auto">
    <h2 class="text-xl font-bold mb-4">إضافة / تعديل عرض</h2>

    <form id="offerForm" class="bg-white p-6 rounded-lg shadow-lg mb-8">
      <input type="hidden" id="editIndex">

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input type="text" id="title" placeholder="عنوان العرض" class="border p-2 rounded" required>
        <input type="text" id="duration" placeholder="المدة" class="border p-2 rounded" required>
        <input type="text" id="hotel" placeholder="الفندق" class="border p-2 rounded" required>
        <input type="text" id="services" placeholder="الخدمات" class="border p-2 rounded" required>
        <input type="text" id="price" placeholder="السعر" class="border p-2 rounded" required>
        <input type="text" id="image" placeholder="رابط الصورة" class="border p-2 rounded">
      </div>

      <button type="submit" class="mt-4 bg-teal-600 text-white px-6 py-2 rounded-lg">حفظ</button>
    </form>

    <h2 class="text-xl font-bold mb-4">العروض الحالية</h2>
    <table class="w-full bg-white rounded-lg shadow-lg">
      <thead>
        <tr class="bg-gray-200">
          <th class="p-2">#</th>
          <th class="p-2">العنوان</th>
          <th class="p-2">المدة</th>
          <th class="p-2">السعر</th>
          <th class="p-2">إجراءات</th>
        </tr>
      </thead>
      <tbody id="offersTable"></tbody>
    </table>
  </main>

  <script>
    let offers = JSON.parse(localStorage.getItem("offers")) || [];

    const form = document.getElementById("offerForm");
    const offersTable = document.getElementById("offersTable");
    const editIndex = document.getElementById("editIndex");

    // حفظ أو تعديل عرض
    form.addEventListener("submit", function(e) {
      e.preventDefault();

      const newOffer = {
        title: document.getElementById("title").value,
        duration: document.getElementById("duration").value,
        hotel: document.getElementById("hotel").value,
        services: document.getElementById("services").value,
        price: document.getElementById("price").value,
        image: document.getElementById("image").value || "https://via.placeholder.com/400x200"
      };

      if (editIndex.value) {
        offers[editIndex.value] = newOffer;
        editIndex.value = "";
      } else {
        offers.push(newOffer);
      }

      localStorage.setItem("offers", JSON.stringify(offers));
      form.reset();
      renderOffers();
    });

    // عرض البيانات
    function renderOffers() {
      offersTable.innerHTML = "";
      offers.forEach((offer, index) => {
        offersTable.innerHTML += `
          <tr>
            <td class="border p-2">${index+1}</td>
            <td class="border p-2">${offer.title}</td>
            <td class="border p-2">${offer.duration}</td>
            <td class="border p-2">${offer.price}</td>
            <td class="border p-2 text-center">
              <button onclick="editOffer(${index})" class="bg-blue-500 text-white px-3 py-1 rounded">تعديل</button>
              <button onclick="deleteOffer(${index})" class="bg-red-500 text-white px-3 py-1 rounded">حذف</button>
            </td>
          </tr>
        `;
      });
    }

    // تعديل
    function editOffer(index) {
      const offer = offers[index];
      document.getElementById("title").value = offer.title;
      document.getElementById("duration").value = offer.duration;
      document.getElementById("hotel").value = offer.hotel;
      document.getElementById("services").value = offer.services;
      document.getElementById("price").value = offer.price;
      document.getElementById("image").value = offer.image;
      editIndex.value = index;
    }

    // حذف
    function deleteOffer(index) {
      offers.splice(index, 1);
      localStorage.setItem("offers", JSON.stringify(offers));
      renderOffers();
    }

    renderOffers();
  </script>

</body>
</html>
