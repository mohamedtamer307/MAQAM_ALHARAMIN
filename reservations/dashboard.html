
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لوحة التحكم</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body class="bg-gray-100">

<!-- LOGIN -->

<div id="loginPage" class="min-h-screen flex items-center justify-center">

<div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">

<h2 class="text-3xl font-bold text-center mb-6">
تسجيل دخول الإدارة
</h2>

<input
id="username"
type="text"
placeholder="اسم المستخدم"
class="w-full border p-3 rounded mb-4"
>

<input
id="password"
type="password"
placeholder="كلمة المرور"
class="w-full border p-3 rounded mb-4"
>

<button
onclick="login()"
class="w-full bg-teal-600 text-white p-3 rounded"
>
دخول
</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<!-- DASHBOARD -->

<div id="dashboardPage" class="hidden">

<header class="bg-teal-700 text-white p-5">

<div class="flex gap-3">

<a href="Bookings/Bookings.html"
class="bg-blue-600 px-4 py-2 rounded-lg text-white">
إدارة الحجوزات
</a>

<button
onclick="logout()"
class="bg-red-500 px-4 py-2 rounded-lg">
تسجيل الخروج
</button>

</div>

</header>

<div class="max-w-6xl mx-auto p-6">

<form id="offerForm"
class="bg-white p-6 rounded-xl shadow-lg mb-8">

<input type="hidden" id="offerId">

<div class="grid md:grid-cols-2 gap-4">

<input
id="title"
type="text"
placeholder="اسم الباقة"
required
class="border p-3 rounded"
>

<textarea
id="description"
placeholder="وصف الباقة"
class="border p-3 rounded h-28">
</textarea>

<textarea
id="features"
placeholder="مميزات الرحلة"
class="border p-3 rounded h-28">
</textarea>

<textarea
id="extraInfo"
placeholder="معلومات إضافية"
class="border p-3 rounded h-28">
</textarea>



<input
id="image"
type="file"
accept="image/*"
class="border p-3 rounded"
>

</div>

<!-- الرحلات -->

<h3 class="text-xl font-bold mt-8 mb-4">
مواعيد الرحلات
</h3>

<div class="grid md:grid-cols-2 gap-4 mb-6">

<input
id="trip1Go"
placeholder="الرحلة الأولى - الذهاب"
class="border p-3 rounded">

<input
id="trip1Back"
placeholder="الرحلة الأولى - العودة"
class="border p-3 rounded">

<input
id="trip2Go"
placeholder="الرحلة الثانية - الذهاب"
class="border p-3 rounded">

<input
id="trip2Back"
placeholder="الرحلة الثانية - العودة"
class="border p-3 rounded">

<input
id="trip3Go"
placeholder="الرحلة الثالثة - الذهاب"
class="border p-3 rounded">

<input
id="trip3Back"
placeholder="الرحلة الثالثة - العودة"
class="border p-3 rounded">

<input
id="trip4Go"
placeholder="الرحلة الرابعة - الذهاب"
class="border p-3 rounded">

<input
id="trip4Back"
placeholder="الرحلة الرابعة - العودة"
class="border p-3 rounded">

</div>

<!-- أسعار الغرف -->

<h3 class="text-xl font-bold mt-8 mb-4">
أسعار الغرف
</h3>

<div class="grid md:grid-cols-3 gap-4 mb-6">

<input
id="price5"
placeholder="الخماسية المشتركة"
class="border p-3 rounded">

<input
id="price4"
placeholder="الرباعية الخاصة"
class="border p-3 rounded">

<input
id="price3"
placeholder="الثلاثية الخاصة"
class="border p-3 rounded">

<input
id="price2"
placeholder="الثنائية الخاصة"
class="border p-3 rounded">

<input
id="singlePrice"
placeholder="الخاصة (سرير واحد)"
class="border p-3 rounded">

<input
id="goOnlyPrice"
placeholder="ذهاب فقط"
class="border p-3 rounded">

<input
id="goReturnPrice"
placeholder="ذهاب وعودة"
class="border p-3 rounded">

</div>

<button
type="submit"
class="bg-teal-600 text-white px-6 py-3 rounded mt-4"
>
حفظ الباقة
</button>

</form>

<div class="bg-white rounded-xl shadow-lg overflow-hidden">

<table class="w-full">

<thead class="bg-gray-200">

<tr>

<th class="p-3">
الصورة
</th>

<th class="p-3">
اسم الباقة
</th>

<th class="p-3">
الوصف
</th>

<th class="p-3">
السعر
</th>

<th class="p-3">
إجراءات
</th>

</tr>

</thead>

<tbody id="offersTable"></tbody>

</table>

</div>



</div>

<script>



/* بيانات الدخول */

const ADMIN_USER = "admin";
const ADMIN_PASS = "123456";

/* تسجيل الدخول */

async function login(){

const username =
document.getElementById("username").value;

const password =
document.getElementById("password").value;

const { data, error } =
await supabaseClient
.from("admins")
.select("*")
.eq("username",username)
.eq("password",password)
.eq("role","dashboard")
.single();

if(error || !data){

alert("بيانات الدخول غير صحيحة");

return;

}

sessionStorage.setItem(
"adminLogged",
"true"
);

showDashboard();

}

function showDashboard(){

document
.getElementById("loginPage")
.classList.add("hidden");

document
.getElementById("dashboardPage")
.classList.remove("hidden");

loadOffers();
loadBookings();

}

if(
sessionStorage.getItem("adminLogged")
==="true"
)
{
showDashboard();
}

/* تحميل الباقات */

async function loadOffers(){

const { data } =
await supabaseClient
.from("offers")
.select("*")
.order("id",{ascending:false});

const table =
document.getElementById("offersTable");

table.innerHTML="";

data.forEach(offer=>{

table.innerHTML += `

<tr class="border-b">

<td class="p-3">
<img
src="${offer.image}"
class="w-24 h-24 object-cover rounded-lg border">
</td>

<td class="p-3 font-bold text-teal-700">
${offer.title}
</td>

<td class="p-3 max-w-xs">
<div class="line-clamp-3 text-gray-600">
${offer.description || ""}
</div>
</td>

<td class="p-3">
<span class="bg-yellow-100 text-yellow-800 px-3 py-1 rounded-full">
ابتداءً من ${offer.five_price || 0} ريال
</span>
</td>

<td class="p-3">

<button
onclick="editOffer(${offer.id})"
class="bg-blue-500 text-white px-3 py-1 rounded">
تعديل
</button>

<button
onclick="deleteOffer(${offer.id})"
class="bg-red-500 text-white px-3 py-1 rounded">
حذف
</button>

</td>

</tr>

`;

});

}

/* إضافة أو تعديل */

document
.getElementById("offerForm")
.addEventListener(
"submit",
async(e)=>{

e.preventDefault();

let imageUrl = "";

const file =
document.getElementById("image").files[0];

if(file){

const extension =
file.name.split(".").pop().toLowerCase();

const fileName =
`offer-${Date.now()}.${extension}`;

console.log("Uploading:", fileName);

const {
data: uploadData,
error: uploadError
} = await supabaseClient.storage
.from("offers")
.upload(
fileName,
file,
{
upsert: true
}
);

console.log("Upload Data:", uploadData);
console.log("Upload Error:", uploadError);

if(uploadError){

alert(
"خطأ رفع الصورة:\n" +
JSON.stringify(uploadError)
);

return;
}

const {
data: publicData
} = supabaseClient.storage
.from("offers")
.getPublicUrl(fileName);

imageUrl = publicData.publicUrl;

console.log("Image URL:", imageUrl);

}


const offerId =
document.getElementById("offerId").value;

const payload = {

title:
document.getElementById("title").value,

description:
document.getElementById("description").value,

features:
document.getElementById("features").value,

extra_info:
document.getElementById("extraInfo").value,

trip1:
`${document.getElementById("trip1Go").value} | ${document.getElementById("trip1Back").value}`,

trip2:
`${document.getElementById("trip2Go").value} | ${document.getElementById("trip2Back").value}`,

trip3:
`${document.getElementById("trip3Go").value} | ${document.getElementById("trip3Back").value}`,

trip4:
`${document.getElementById("trip4Go").value} | ${document.getElementById("trip4Back").value}`,

five_price:
parseInt(document.getElementById("price5").value || 0),

four_price:
parseInt(document.getElementById("price4").value || 0),

three_price:
parseInt(document.getElementById("price3").value || 0),

two_price:
parseInt(document.getElementById("price2").value || 0),

single_price:
parseInt(document.getElementById("singlePrice").value || 0),

transport_one_way:
parseInt(document.getElementById("goOnlyPrice").value || 0),

transport_round_trip:
parseInt(document.getElementById("goReturnPrice").value || 0)

};

if(imageUrl){
payload.image = imageUrl;
}

if(offerId){

await supabaseClient
.from("offers")
.update(payload)
.eq("id",offerId);

}else{

payload.image=imageUrl;

await supabaseClient
.from("offers")
.insert([payload]);

}

document
.getElementById("offerForm")
.reset();

document
.getElementById("offerId")
.value="";

loadOffers();

}
);

/* حذف */

async function deleteOffer(id){

if(!confirm("حذف الباقة؟"))
return;

await supabaseClient
.from("offers")
.delete()
.eq("id",id);

loadOffers();

}

/* تعديل */

async function editOffer(id){

const { data } =
await supabaseClient
.from("offers")
.select("*")
.eq("id",id)
.single();

document
.getElementById("offerId")
.value=data.id;

document
.getElementById("title")
.value=data.title;

document.getElementById("description").value =
data.description || "";

document.getElementById("features").value =
data.features || "";

document.getElementById("extraInfo").value =
data.extra_info || "";

document.getElementById("price5").value =
data.five_price || "";

document.getElementById("price4").value =
data.four_price || "";

document.getElementById("price3").value =
data.three_price || "";

document.getElementById("price2").value =
data.two_price || "";

document.getElementById("singlePrice").value =
data.single_price || "";

document.getElementById("goOnlyPrice").value =
data.transport_one_way || "";

document.getElementById("goReturnPrice").value =
data.transport_round_trip || "";

window.scrollTo({
top:0,
behavior:"smooth"
});

}

/* حذف حجز */

async function deleteBooking(id){

if(!confirm("حذف الحجز؟"))
return;

const { error } =
await supabaseClient
.from("bookings")
.delete()
.eq("id",id);

if(error){

alert("فشل حذف الحجز");
return;

}

loadBookings();

}


/* تحميل الحجوزات */

async function loadBookings(){

const { data, error } =
await supabaseClient
.from("bookings")
.select("*")
.order("id",{ascending:false});

if(error){

console.log(error);
return;

}

const table =
document.getElementById("bookingsTable");

table.innerHTML = "";

data.forEach(booking=>{

table.innerHTML += `

<tr class="border-b">

<td class="p-3">
${booking.package_name || "-"}
</td>

<td class="p-3">
${booking.full_name || "-"}
</td>

<td class="p-3">
${booking.phone || "-"}
</td>

<td class="p-3">
${booking.passengers || "-"}
</td>

<td class="p-3">
${booking.status || "جديد"}
</td>

<td class="p-3">
${new Date(
booking.created_at
).toLocaleDateString("ar-SA")}
</td>

<td class="p-3">

<a
href="https://wa.me/${booking.phone}"
target="_blank"
class="bg-green-500 text-white px-3 py-1 rounded">

واتساب

</a>

<button
onclick="deleteBooking(${booking.id})"
class="bg-red-500 text-white px-3 py-1 rounded mr-2">

حذف

</button>

</td>

</tr>

`;

});

}

function logout(){

sessionStorage.removeItem(
"adminLogged"
);

location.reload();

}

window.login = login;
window.editOffer = editOffer;
window.deleteOffer = deleteOffer;
window.deleteBooking = deleteBooking;
window.logout = logout;

</script>

</body>
</html>
