<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>حجز الرحلة</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="style.css">

</head>

<body class="bg-[#F8F6F1]">

<div class="container mx-auto px-6 py-10">

<div class="max-w-3xl mx-auto bg-white p-8 rounded-2xl shadow-lg">

<h1 class="text-3xl font-bold text-center mb-8 text-[#0A2342]">
حجز الرحلة
</h1>

<div id="packageInfo" class="mb-8"></div>

<form id="bookingForm">

<input
type="text"
id="fullName"
placeholder="الاسم الثلاثي"
required
class="w-full border p-3 rounded-lg mb-4"
>

<input
type="tel"
id="phone"
placeholder="رقم الجوال"
required
class="w-full border p-3 rounded-lg mb-4"
>

<select
id="tripDate"
class="w-full border p-3 rounded-lg mb-4"
required>

<option value="">
اختر موعد الرحلة
</option>

</select>



<select
id="roomType"
class="w-full border p-3 rounded-lg mb-4"
required>

<option value="">
اختر نوع الحجز
</option>

<option value="خماسية مشتركة">
خماسية خاصة/مشتركة(بالفرد)
</option>

<option value="رباعية خاصة">
رباعية خاصة
</option>

<option value="ثلاثية خاصة">
ثلاثية خاصة
</option>

<option value="ثنائية خاصة">
ثنائية خاصة
</option>

<option value="خاصة">
خاصة
</option>

<option value="مواصلات ذهاب فقط">
مواصلات ذهاب فقط
</option>

<option value="مواصلات ذهاب وعودة">
مواصلات ذهاب وعودة
</option>

</select>

<input
type="number"
id="passengers"
placeholder="عدد الافراد "
value=""
min="1"
required
class="w-full border p-3 rounded-lg mb-4"
>

<div
id="totalPrice"
class="bg-green-100 text-green-700 text-center p-4 rounded-xl text-xl font-bold mb-4">

الإجمالي: 0 ريال

</div>

<textarea
id="notes"
placeholder="ملاحظات"
class="w-full border p-3 rounded-lg mb-4">
</textarea>

<div class="bg-yellow-100 p-4 rounded-xl mb-6">

تنبيه:

تكلفة تمديد الليلة بدون العودة:
140 ريال

<br><br>

تكلفة تمديد الليلة مع العودة:
160 ريال

</div>

<button
type="submit"
class="w-full bg-[#C9A44C] text-white py-3 rounded-lg">

تأكيد الحجز

</button>

</form>

</div>

</div>

<script src="supabase.js"></script>
<script src="booking.js"></script>

</body>
</html>
